version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: career-copilot-db

    restart: unless-stopped

    ports:
      - "5432:5432"

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: career_copilot

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: